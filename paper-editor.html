<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Editor · Peak Potentia</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .editor-side-tabs {
            position: fixed;
            left: 0;
            top: 64px;
            bottom: 0;
            width: 120px;
            background: #f8f9f6;
            border-right: 1px solid #e3e0d4;
            padding: 1rem .6rem;
            display: none;
            flex-direction: column;
            gap: .5rem;
            z-index: 50;
            overflow-y: auto;
        }
        .editor-side-tabs.show { display: flex; }
        .editor-side-tab {
            padding: .6rem .7rem;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            text-align: left;
            font-size: .82rem;
            font-weight: 600;
            color: #5a6b5e;
            cursor: pointer;
        }
        .editor-side-tab:hover { background: #eef1ea; }
        .editor-side-tab.active { background: #1c3a2b; color: #fff; }
        body.side-tabs-active .doc-wrap { margin-left: 120px; }
        @media (max-width: 900px) {
            .editor-side-tabs {
                position: static;
                width: auto;
                flex-direction: row;
                border-right: none;
                border-bottom: 1px solid #e3e0d4;
            }
            body.side-tabs-active .doc-wrap { margin-left: 0; }
        }
    </style>

</head>

<body class="page-editor">

    <nav class="ed-top">
        <div class="container">
            <div class="ed-top-inner">
                <a href="student-dashboard.html" id="edBackLink" class="ed-back" data-testid="back-btn">Back to
                    Dashboard</a>

                <div style="display:flex; align-items:center; gap:1rem;">
                    <span class="edit-badge" id="editBadge">Edit Mode</span>
                    <div class="ed-status saved" id="saveStatus">
                        <span class="dot"></span>
                        <span id="saveText">All changes saved</span>
                    </div>
                </div>

                <div class="ed-actions">
                    <button class="ed-btn" onclick="openComments()" data-testid="comments-btn">Comments</button>
                    <button class="ed-btn" onclick="openHistory()" data-testid="history-btn">⟲ History</button>
                    <button class="ed-btn" onclick="manualSave()" data-testid="save-btn">Save</button>
                    <div class="download-wrap">
                        <button class="ed-btn primary" onclick="toggleDownload(event)"
                            data-testid="download-btn">Download</button>
                        <div class="download-menu" id="downloadMenu">
                            <button onclick="downloadPDF()">Download as PDF</button>
                            <button onclick="downloadDOCX()">Download as Word (.docx)</button>
                            <button onclick="downloadHTML()">Download as HTML</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Only visible to admin / co-admin: switch between the student's editor and the writer's editor -->
    <aside class="editor-side-tabs" id="editorSideTabs">
        <button class="editor-side-tab active" id="tabStudentBtn" onclick="switchSide('student')">Student</button>
        <button class="editor-side-tab" id="tabWriterBtn" onclick="switchSide('writer')">Writer</button>
    </aside>

    <div class="doc-wrap">
        <div class="doc-title-box">
            <textarea class="doc-title-input" id="docTitle" placeholder="Your paper title" rows="1" autocomplete="off"
                data-testid="doc-title" oninput="autoGrowTitle(this)"></textarea>
            <textarea class="doc-abstract-input" id="docAbstract" placeholder="Write a brief abstract (2-3 sentences)"
                rows="2" data-testid="doc-abstract"></textarea>

            <div class="doc-meta-row">
                <div class="meta-item">
                    Track:
                    <select class="meta-select" id="docTrack">
                        <option value="research">Research Paper</option>
                        <option value="essay">Essay</option>
                    </select>
                </div>
                <div class="meta-item">
                    Status:
                    <select class="meta-select" id="docStatus">
                        <option value="draft">Draft</option>
                        <option value="under_review">Under Review</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="meta-item" id="lastSavedTime">-</div>
            </div>
        </div>

        <div class="editor-card">
            <div id="editor"></div>
            <div class="img-resize-toolbar" id="imgResizeToolbar">
                <button onclick="resizeImg(25)" title="Small (25%)">S</button>
                <button onclick="resizeImg(50)" title="Medium (50%)">M</button>
                <button onclick="resizeImg(75)" title="Large (75%)">L</button>
                <button onclick="resizeImg(100)" title="Full width">Full</button>
                <span class="divider"></span>
                <button onclick="customResize()" title="Custom size">Custom</button>
                <span class="divider"></span>
                <button class="delete-btn" onclick="deleteImg()" title="Delete image">✕</button>
            </div>
        </div>

        <div class="bottom-info">
            <div class="bottom-info-item">Words: <strong id="wordCount">0</strong></div>
            <div class="bottom-info-item">Characters: <strong id="charCount">0</strong></div>
            <div class="bottom-info-item">Reading time: <strong id="readTime">0 min</strong></div>
        </div>
    </div>

    <div id="toast"></div>

    <!-- ───── HISTORY DRAWER ───── -->
    <div class="hist-overlay" id="histOverlay" onclick="closeHistoryBg(event)">
        <aside class="hist-drawer">
            <div class="hist-head">
                <div>
                    <h3>Version History</h3>
                    <div class="hist-sub">Who · When · Restore</div>
                </div>
                <button onclick="closeHistory()">×</button>
            </div>
            <div class="hist-list" id="histList">
                <div class="hist-empty">Loading…</div>
            </div>
        </aside>
    </div>

    <!-- ───── VERSION PREVIEW ───── -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-box">
            <div class="preview-head">
                <div class="pmeta" id="previewMeta"></div>
                <h2 id="previewTitle"></h2>
            </div>
            <div class="preview-body" id="previewBody"></div>
            <div class="preview-foot">
                <button class="ed-btn" onclick="closePreview()">Close</button>
                <button class="ed-btn primary" onclick="restoreFromPreview()">Restore this version</button>
            </div>
        </div>
    </div>

    <div class="error-overlay" id="errorOverlay">
        <div class="error-card">
            <h2 id="errTitle">Something went wrong</h2>
            <p id="errMsg">An unexpected error occurred.</p>
            <button class="ed-btn primary" id="errBackBtn" onclick="goBackToDashboard()">Back to Dashboard</button>
        </div>
    </div>

    <div class="cmt-overlay" id="cmtOverlay" onclick="closeCommentsBg(event)">
        <aside class="cmt-drawer">
            <div class="cmt-head">
                <div>
                    <h3>Comments</h3>
                    <div class="cmt-sub">Visible to student, writer &amp; admin</div>
                </div>
                <button onclick="closeComments()">×</button>
            </div>
            <div class="cmt-list" id="cmtList">
                <div class="cmt-empty">Loading…</div>
            </div>
            <div class="cmt-target-row" style="padding:0 1rem;">
                <select id="cmtTarget" class="cmt-target-select"
                    style="width:100%;padding:6px 8px;border:1px solid #d8d0bd;border-radius:5px;font-size:.8rem;background:#fff;"></select>
            </div>
            <div class="cmt-input-row">
                <textarea id="cmtInput" placeholder="Write a comment..." rows="2"></textarea>
                <button class="ed-btn primary" onclick="postComment()">Post</button>
            </div>
        </aside>
    </div>

    <script>
        // Auto-grow textarea title so long titles wrap naturally
        function autoGrowTitle(el) {
            if (!el) return;
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }
        // Initial grow + after content loaded
        window.addEventListener('load', function () {
            var t = document.getElementById('docTitle');
            if (t) {
                autoGrowTitle(t);
                // Watch for programmatic value changes (paper-editor.js sets value after fetch)
                var lastVal = t.value;
                setInterval(function () {
                    if (t.value !== lastVal) { lastVal = t.value; autoGrowTitle(t); }
                }, 400);
            }
        });
    </script>

    <script src="paper-editor.js"></script>

</body>

</html>
