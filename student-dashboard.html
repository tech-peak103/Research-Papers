<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard · Peak Potentia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dash-student">

    <div class="app-shell">
        <aside class="app-sidebar" data-testid="student-sidebar">
            <div class="sb-brand">
                <div class="sb-logo">
                    <img src="https://fr1ekw4xx.tribe.junction.express/uploads/2025/05-May/29-Thu/sm/header-icon_6838241632ce3.png"
                        alt="">
                </div>
                <div class="sb-brand-text">
                    <div class="sb-brand-name">Peak Potentia</div>
                    <div class="sb-brand-role">Student</div>
                </div>
            </div>

            <div class="sb-section">My Papers</div>
            <nav class="sb-nav">
                <button class="sb-item active" data-view="all" onclick="sbSetView('all', event)" data-testid="nav-all">
                    <span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <path d="M14 2v6h6" />
                        </svg></span>
                    <span class="sb-label">All Papers</span>
                </button>
                <button class="sb-item" data-view="draft" onclick="sbSetView('draft', event)" data-testid="nav-draft">
                    <span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9" />
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z" />
                        </svg></span>
                    <span class="sb-label">Drafts</span>
                </button>
                <button class="sb-item" data-view="under_review" onclick="sbSetView('under_review', event)"
                    data-testid="nav-review">
                    <span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg></span>
                    <span class="sb-label">Under Review</span>
                </button>
                <button class="sb-item" data-view="completed" onclick="sbSetView('completed', event)"
                    data-testid="nav-completed">
                    <span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></span>
                    <span class="sb-label">Completed</span>
                </button>
            </nav>

            <div class="sb-spacer"></div>

            <div class="sb-profile">
                <div class="sb-avatar" id="userAv">—</div>
                <div class="sb-pinfo">
                    <div class="sb-pname" id="userName">—</div>
                    <div class="sb-puser" id="userId">—</div>
                </div>
                <button class="sb-logout" onclick="doLogout()" title="Logout" data-testid="logout-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <main class="app-main">
            <div class="app-topbar">
                <div class="tb-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" placeholder="Search your papers..." data-testid="search-input">
                </div>
                <div class="tb-right">
                    <button class="tb-icon-btn" title="Notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="app-content">
                <div class="dash-welcome">
                    <div>
                        <h1>Welcome back, <em id="welcomeName">Student</em></h1>
                        <p>Write, edit, and track your research papers and essays here.</p>
                    </div>
                </div>

                <div class="stats-bar">
                    <div class="stat-card icon-purple">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <path d="M14 2v6h6" />
                            </svg></div>
                        <div class="label">My Papers</div>
                        <div class="num" id="statTotal">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 20h9" />
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z" />
                            </svg></div>
                        <div class="label">Drafts</div>
                        <div class="num" id="statDraft">—</div>
                    </div>
                    <div class="stat-card icon-amber accent">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg></div>
                        <div class="label">Under Review</div>
                        <div class="num" id="statReview">—</div>
                    </div>
                    <div class="stat-card icon-green">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg></div>
                        <div class="label">Completed</div>
                        <div class="num" id="statDone">—</div>
                    </div>
                </div>

                <div class="tab-row">
                    <div class="tab active" onclick="setView('all', event)">All</div>
                    <div class="tab" onclick="setView('draft', event)">Drafts</div>
                    <div class="tab" onclick="setView('under_review', event)">Under Review</div>
                    <div class="tab" onclick="setView('completed', event)">Completed</div>
                </div>

                <div id="papersList">
                    <div class="loading">Loading papers…</div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast"></div>

    <script>
        'use strict';
        var SUPABASE_URL = 'https://uxhltsmddtuiqoadhdfd.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4aGx0c21kZHR1aXFvYWRoZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0Mjc2NDIsImV4cCI6MjA5NTAwMzY0Mn0.oKwtLMYhOpj_z4W-G9aEe1kmp9_q6sLDl273dQLBfbw';
        var IS_LIVE = SUPABASE_URL && SUPABASE_URL.indexOf('https://') === 0;
        var sb = IS_LIVE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        function loadSession() {
            var raw = sessionStorage.getItem('sc_user') || localStorage.getItem('sc_user');
            if (!raw) return null;
            try { var u = JSON.parse(raw); sessionStorage.setItem('sc_user', raw); return u; }
            catch (e) { return null; }
        }
        var USER = loadSession();
        if (!USER || !USER.id) {
            window.location.href = 'index.html';
        }

        var MY_PAPERS = [], VIEW = 'all';
        var SEARCH_TERM = '';
        document.querySelector('.tb-search input').addEventListener('input', function (e) {
            SEARCH_TERM = e.target.value.trim().toLowerCase();
            render();
        });

        function initials(n) { return (n || 'S').split(' ').map(function (x) { return x[0]; }).join('').slice(0, 2).toUpperCase(); }
        function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); } catch (e) { return d; } }
        function fmtWhen(d) { if (!d) return '—'; try { return new Date(d).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); } catch (e) { return d; } }
        function esc(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function paperTypeLabel(p) {
            if (p.paper_type === 'competition') return 'Competition: ' + (p.competition_name || '—');
            if (p.paper_type === 'academic') return 'Subject: ' + (p.subject || '—');
            return '';
        }

        document.getElementById('userName').textContent = USER.full_name;
        document.getElementById('userId').textContent = '@' + (USER.username || '');
        document.getElementById('userAv').textContent = initials(USER.full_name);
        document.getElementById('welcomeName').textContent = (USER.full_name || 'Student').split(' ')[0];

        var _tt;
        function toast(msg, type) { type = type || ''; var el = document.getElementById('toast'); el.textContent = msg; el.className = 'show ' + type; clearTimeout(_tt); _tt = setTimeout(function () { el.className = ''; }, 3000); }

        async function loadPapers() {
            var list = document.getElementById('papersList');
            if (!IS_LIVE) { list.innerHTML = '<div class="loading">Supabase config missing</div>'; return; }
            try {
                var res = await sb.from('papers')
                    .select('*')
                    .eq('student_id', USER.id)
                    .order('updated_at', { ascending: false });
                if (res.error) throw res.error;
                MY_PAPERS = res.data || [];

                document.getElementById('statTotal').textContent = MY_PAPERS.length;
                document.getElementById('statDraft').textContent = MY_PAPERS.filter(function (p) { return (p.status || 'draft') === 'draft'; }).length;
                document.getElementById('statReview').textContent = MY_PAPERS.filter(function (p) { return p.status === 'under_review'; }).length;
                document.getElementById('statDone').textContent = MY_PAPERS.filter(function (p) { return p.status === 'completed' || p.status === 'awarded'; }).length;

                render();
            } catch (e) { list.innerHTML = '<div class="loading">Error: ' + e.message + '</div>'; }
        }

        function setView(v, e) {
            VIEW = v;
            document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
            if (e) e.target.classList.add('active');
            // Sync sidebar
            document.querySelectorAll('.sb-item').forEach(function (s) { s.classList.toggle('active', s.getAttribute('data-view') === v); });
            render();
        }

        function sbSetView(v, e) {
            VIEW = v;
            document.querySelectorAll('.sb-item').forEach(function (s) { s.classList.remove('active'); });
            if (e && e.currentTarget) e.currentTarget.classList.add('active');
            // Sync tabs
            var labels = { 'all': 'All', 'draft': 'Drafts', 'under_review': 'Under Review', 'completed': 'Completed' };
            document.querySelectorAll('.tab').forEach(function (t) {
                t.classList.toggle('active', t.textContent.trim() === labels[v]);
            });
            render();
        }

        function render() {
            var list = document.getElementById('papersList');
            var data = MY_PAPERS;
            if (VIEW === 'draft') data = MY_PAPERS.filter(function (p) { return (p.status || 'draft') === 'draft'; });
            else if (VIEW === 'under_review') data = MY_PAPERS.filter(function (p) { return p.status === 'under_review'; });
            else if (VIEW === 'completed') data = MY_PAPERS.filter(function (p) { return p.status === 'completed' || p.status === 'awarded'; });
            if (SEARCH_TERM) {
                data = data.filter(function (p) {
                    var title = (p.title || '').toLowerCase();
                    return title.indexOf(SEARCH_TERM) !== -1;
                });
            }
            if (!data.length) {
                list.innerHTML = '<div class="empty-state"><div class="em-icon">✒️</div><h3>No papers yet</h3><p>'
                    + (VIEW === 'all' ? 'Your admin will create a paper for you here.' : 'There is nothing in this filter.')
                    + '</p></div>';
                return;
            }
            var h = '<div class="card-wrap"><table><thead><tr><th>Title</th><th>Track</th><th>Words</th><th>Status</th><th></th></tr></thead><tbody>';
            data.forEach(function (p) {
                var typeLbl = paperTypeLabel(p);
                h += '<tr class="clickable" onclick="openPaper(\'' + p.id + '\')">'
                    + '<td><div class="ptitle">' + esc(p.title || 'Untitled') + '</div>' + (typeLbl ? '<div class="psub">' + esc(typeLbl) + '</div>' : '') + (p.abstract ? '<div class="psub">' + esc(String(p.abstract).slice(0, 80)) + (String(p.abstract).length > 80 ? '…' : '') + '</div>' : '') + '</td>'
                    + '<td><span class="psub">' + (p.track === 'essay' ? 'Essay' : 'Research') + '</span></td>'
                    + '<td>' + (p.word_count || 0) + '</td>'
                    + '<td><span class="pstatus ' + (p.status || 'draft') + '">' + (p.status || 'draft').replace('_', ' ') + '</span></td>'
                    + '<td><div class="row-actions"><button class="view-btn" onclick="event.stopPropagation();openPaper(\'' + p.id + '\')">Open / Edit →</button>' + delBtn(p.id) + '</div></td>'
                    + '</tr>';
            });
            h += '</tbody></table></div>';
            list.innerHTML = h;
        }

        function delBtn(id) {
            return '<button class="del-btn" title="Delete paper" onclick="event.stopPropagation();deletePaper(\'' + id + '\')">'
                + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>'
                + 'Delete</button>';
        }

        async function deletePaper(id) {
            if (!confirm('Are you sure you want to delete this paper? It will be permanently deleted and cannot be recovered.')) return;
            try {
                try { await sb.from('paper_versions').delete().eq('paper_id', id); } catch (e) { }
                try { await sb.from('paper_collaborators').delete().eq('paper_id', id); } catch (e) { }
                var res = await sb.from('papers').delete().eq('id', id);
                if (res.error) throw res.error;

                MY_PAPERS = MY_PAPERS.filter(function (p) { return p.id !== id; });
                document.getElementById('statTotal').textContent = MY_PAPERS.length;
                document.getElementById('statDraft').textContent = MY_PAPERS.filter(function (p) { return (p.status || 'draft') === 'draft'; }).length;
                document.getElementById('statReview').textContent = MY_PAPERS.filter(function (p) { return p.status === 'under_review'; }).length;
                document.getElementById('statDone').textContent = MY_PAPERS.filter(function (p) { return p.status === 'completed' || p.status === 'awarded'; }).length;
                render();
                toast('Paper deleted ✓', 'success');
            } catch (e) { toast('Delete error: ' + e.message, 'error'); }
        }

        function openPaper(id) { window.location.href = 'paper-editor.html?id=' + id; }
        function doLogout() { localStorage.removeItem('sc_user'); sessionStorage.removeItem('sc_user'); window.location.href = 'index.html'; }

        loadPapers();
    </script>

</body>

</html>
