<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Dashboard · Scholarly Compass</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #fbfbfb;
        }

        .dash-top {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-top-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .dash-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dash-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--maroon);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .dash-uname {
            font-family: var(--serif);
            font-size: 1.05rem;
            color: var(--green);
            font-weight: 500;
        }

        .dash-uid {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            border-radius: 3px;
            cursor: pointer;
        }

        .logout-btn:hover {
            color: var(--maroon);
            border-color: var(--maroon);
        }

        .dash-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .dash-welcome {
            margin-bottom: 3rem;
        }

        .dash-welcome h1 {
            font-family: var(--serif);
            font-size: clamp(2.2rem, 4.5vw, 3.4rem);
            color: var(--green);
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .dash-welcome h1 em {
            color: var(--maroon);
            font-style: italic;
        }

        .dash-welcome p {
            color: var(--muted);
            font-size: 1rem;
        }

        /* Tabs */
        .tab-row {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .tab {
            padding: 12px 0;
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab.active {
            color: var(--maroon);
            border-bottom-color: var(--maroon);
        }

        .papers-table-wrap {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-soft);
        }

        thead th {
            padding: 14px 18px;
            text-align: left;
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--green);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: #fcfaf2;
        }

        .ptitle {
            font-family: var(--serif);
            font-size: 1.15rem;
            color: var(--green);
            font-weight: 500;
        }

        .pauthor {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .pstatus {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .pstatus.draft {
            background: rgba(138, 160, 184, .15);
            color: var(--muted);
        }

        .pstatus.under_review {
            background: rgba(232, 146, 74, .15);
            color: #b56a1f;
        }

        .pstatus.completed {
            background: rgba(76, 175, 130, .15);
            color: #2a6b40;
        }

        .pstatus.awarded {
            background: rgba(201, 160, 90, .2);
            color: #8a6a2f;
        }

        .view-btn {
            padding: 6px 14px;
            background: var(--green);
            color: var(--bg);
            border: none;
            border-radius: 3px;
            font-family: var(--sans);
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .view-btn:hover {
            background: var(--green-dark);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg);
            border: 1px dashed var(--border);
            border-radius: 4px;
        }

        .empty-state .em-icon {
            font-family: var(--serif);
            font-size: 4rem;
            color: var(--border);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-family: var(--serif);
            font-size: 1.5rem;
            color: var(--green);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--muted);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 1.3rem 1.4rem;
            border-radius: 3px;
        }

        .stat-card .label {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-card .num {
            font-family: var(--serif);
            font-size: 2rem;
            color: var(--green);
            font-weight: 500;
            line-height: 1;
        }
    </style>
</head>

<body>

    <nav class="dash-top">
        <div class="container">
            <div class="dash-top-inner">
                <a href="#" class="brand">
                    <div class="brand-box">S</div>
                    <div>
                        <div class="brand-name">Scholarly Compass</div>
                        <span class="brand-sub">Judge Panel</span>
                    </div>
                </a>
                <div class="dash-user">
                    <div class="dash-avatar" id="userAv">—</div>
                    <div>
                        <div class="dash-uname" id="userName">—</div>
                        <div class="dash-uid" id="userId">—</div>
                    </div>
                    <button class="logout-btn" onclick="doLogout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="dash-body">
        <div class="dash-welcome">
            <h1>Welcome, <em id="welcomeName">Judge</em></h1>
            <p>Review submitted papers, provide feedback, and award merit.</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="label">Total Papers</div>
                <div class="num" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Drafts</div>
                <div class="num" id="statDraft">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Under Review</div>
                <div class="num" id="statReview">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Completed</div>
                <div class="num" id="statDone">—</div>
            </div>
        </div>

        <div class="tab-row">
            <div class="tab active" onclick="filterPapers('all', event)">All Papers</div>
            <div class="tab" onclick="filterPapers('draft', event)">Drafts</div>
            <div class="tab" onclick="filterPapers('under_review', event)">Under Review</div>
            <div class="tab" onclick="filterPapers('completed', event)">Completed</div>
        </div>

        <div id="papersList">
            <div class="loading">Loading papers…</div>
        </div>
    </div>

    <div id="toast"></div>
    

    <script>
        'use strict';

        const SUPABASE_URL = 'https://uxhltsmddtuiqoadhdfd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4aGx0c21kZHR1aXFvYWRoZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0Mjc2NDIsImV4cCI6MjA5NTAwMzY0Mn0.oKwtLMYhOpj_z4W-G9aEe1kmp9_q6sLDl273dQLBfbw';
        const IS_LIVE = SUPABASE_URL && SUPABASE_URL.startsWith('https://');
        const sb = IS_LIVE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let USER = null;
        try { USER = JSON.parse(sessionStorage.getItem('sc_user')); } catch { }
        if (!USER || (USER.role !== 'judge' && USER.role !== 'admin')) {
            window.location.href = 'index.html';
        }

        let ALL_PAPERS = [];
        let CURRENT_FILTER = 'all';

        function initials(name) { return (name || 'J').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase(); }
        function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); } catch { return d; } }

        document.getElementById('userName').textContent = USER.full_name;
        document.getElementById('userId').textContent = '@' + USER.username;
        document.getElementById('userAv').textContent = initials(USER.full_name);
        document.getElementById('welcomeName').textContent = USER.full_name.split(' ')[0];

        let _tt;
        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = 'show ' + type;
            clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 3000);
        }

        async function loadPapers() {
            const list = document.getElementById('papersList');
            if (!IS_LIVE) { list.innerHTML = '<div class="loading">⚠ Supabase config missing</div>'; return; }

            try {
                // Judge/admin sab papers dekh sakta hai
                const { data: papers, error } = await sb.from('papers')
                    .select('*, registrations:student_id(full_name, username, email)')
                    .order('updated_at', { ascending: false });

                if (error) throw error;
                ALL_PAPERS = papers || [];

                // Stats
                document.getElementById('statTotal').textContent = ALL_PAPERS.length;
                document.getElementById('statDraft').textContent = ALL_PAPERS.filter(p => p.status === 'draft').length;
                document.getElementById('statReview').textContent = ALL_PAPERS.filter(p => p.status === 'under_review').length;
                document.getElementById('statDone').textContent = ALL_PAPERS.filter(p => p.status === 'completed' || p.status === 'awarded').length;

                renderPapers();

            } catch (e) {
                list.innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
            }
        }

        function filterPapers(status, e) {
            CURRENT_FILTER = status;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (e) e.target.classList.add('active');
            renderPapers();
        }

        function renderPapers() {
            const list = document.getElementById('papersList');
            const filtered = CURRENT_FILTER === 'all'
                ? ALL_PAPERS
                : ALL_PAPERS.filter(p => p.status === CURRENT_FILTER);

            if (!filtered.length) {
                list.innerHTML = `
            <div class="empty-state">
                <div class="em-icon">📋</div>
                <h3>No papers found</h3>
                <p>${CURRENT_FILTER === 'all' ? 'No submissions yet.' : 'No papers in this status.'}</p>
            </div>`;
                return;
            }

            list.innerHTML = `
        <div class="papers-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Title & Author</th>
                        <th>Track</th>
                        <th>Words</th>
                        <th>Status</th>
                        <th>Updated</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    ${filtered.map(p => `
                        <tr onclick="window.location.href='paper-editor.html?id=${p.id}&judge=1'">
                            <td>
                                <div class="ptitle">${p.title || 'Untitled'}</div>
                                <div class="pauthor">by ${p.registrations?.full_name || '—'} (@${p.registrations?.username || '—'})</div>
                            </td>
                            <td style="font-family: var(--mono); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted);">${p.track === 'essay' ? 'Essay' : 'Research'}</td>
                            <td>${p.word_count || 0}</td>
                            <td><span class="pstatus ${p.status}">${p.status.replace('_', ' ')}</span></td>
                            <td style="font-size: 0.85rem; color: var(--muted);">${fmtDate(p.updated_at)}</td>
                            <td><button class="view-btn">Review →</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }

        function doLogout() {
            sessionStorage.removeItem('sc_user');
            window.location.href = 'index.html';
        }

        loadPapers();
    </script>

</body>

</html>
